<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Bancario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <h1>HOME BANKING</h1>

    <section id="login">
        <h2>¡Hola! Te damos la bienvenida</h2>
        <p>Escribe tu usuario y contraseña para empezar a operar</p>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnIngresar">Ingresar</button>
        <p id="loginMsg"></p>
    </section>

    <section id="registro">
    <h2>Regístrate</h2>
    <input type="text" id="registroNombre" placeholder="Nombre">
    <input type="text" id="registroUsuario" placeholder="Usuario">
    <input type="email" id="registroEmail" placeholder="Tu Email">
    <input type="password" id="registroContraseña" placeholder="Crear Contraseña">
    <button id="btnRegistrar">Crear cuenta</button>
</section>

    <section id="menu" class="hidden">
        <h2 id="bienvenida"></h2>
        <div id="resultado"></div>
        <button id="btnSaldo">Ver saldo</button>

        <button id="btnPerfil">Perfil</button>
        <div id="contenedorPerfil" class="hidden"> 
            <h3>Mi perfil</h3>
            
            <div id="perfilVista">
                <p>Nombre: <span id="perfilNombre"></span></p>
                <p>Email: <span id="perfilEmail"></span></p>
                <p>Usuario: <span id="perfilUsuario"></span></p>
                <p>Contraseña: <span id="perfilContraseña"></span></p>
                <button id="btnEditarPerfil">Editar perfil</button>
            </div>
            
            <div id="perfilEdicion" class="hidden">
                <label for="perfilNombreInput">Nombre</label>
                <input type="text" id="perfilNombreInput" placeholder="Tu nombre">
                <label for="perfilPasswordInput">Nueva contraseña</label>
                <input type="password" id="perfilPasswordInput" placeholder="Dejar en blanco para no cambiar">
                <button id="btnGuardarPerfil">Guardar cambios</button>
                <button id="btnCancelarPerfil">Cancelar</button>
            </div>
        </div>
            
        <button id="btnMenuTransferir">Transferencias</button>
        <div id="contenedorTransferencia" class="hidden">
            <h3>Transferir dinero</h3>
            <input type="email" id="emailDestino" placeholder="Email del destinatario">
            <input type="number" id="montoTransferir" placeholder="Monto a transferir">
            <button id="btnTransferir">Transferir</button>
        </div>
        
        <button id="btnMenuPrestamos">Préstamos</button>
        <div id="contenedorPrestamos" class="hidden">
            <h3>Solicitar préstamo</h3>
            <input type="number" id="montoPrestamo" placeholder="Monto del préstamo">
            <select id="cuotas">
                <option value="">Seleccionar cuotas</option>
                <option value="1">1 cuota (sin interés)</option>
                <option value="3">3 cuotas (15%)</option>
                <option value="6">6 cuotas (25%)</option>
            </select>
            <button id="btnPrestamo">Solicitar préstamo</button>
        </div>
        
        <button id="btnSalir">Cerrar sesión</button>
    </section>


</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>
</body>
</html>
